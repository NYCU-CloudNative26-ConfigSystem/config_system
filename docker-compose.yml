services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_service
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U user -d auth_service
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 3s
      retries: 5
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
    - 7474:7474
    - 7687:7687
    volumes:
    - neo4j_data:/data
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:7474 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
  service-login:
    build: ./Service_Login
    ports:
    - 18000:8000
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/auth_service
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  service-ssot:
    build: ./Service_SSOT
    ports:
    - 18002:3000
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      HOST: 0.0.0.0
      PORT: '3000'
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
  service-config-table:
    build: ./Service_Config_Table
    ports:
    - 18001:18001
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/config_table_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  service-config-export:
    build: ./Service_Config_Export
    ports:
    - 18005:18005
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CONFIG_SERVICE_URL: http://service-config-table:18001
      SSOT_SERVICE_URL: http://service-ssot:3000
    depends_on:
    - service-config-table
    - service-ssot
  frontend-ui:
    build: ./Service_FrontendUI
    ports:
    - 5173:3000
    environment:
      LOGIN_URL: http://service-login:8000
      CONFIG_URL: http://service-config-table:18001
      EXPORT_URL: http://service-config-export:18005
      SSOT_URL: http://service-ssot:3000
    depends_on:
    - service-login
    - service-config-table
    - service-config-export
    - service-ssot
volumes:
  postgres_data: null
  neo4j_data: null
