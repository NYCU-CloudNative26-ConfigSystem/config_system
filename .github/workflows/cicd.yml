name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GAR_LOCATION: us-central1
  GAR_REPO: config-system
  GKE_CLUSTER: config-system
  GKE_REGION: us-central1
  K8S_NAMESPACE: config-system
  # Safe dummy values for CI tests (64 hex chars = valid AES-256 key)
  CI_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  CI_SECRET_KEY: test-secret-key-for-ci-minimum-32-chars

# ── 1. Tests ──────────────────────────────────────────────────────────────────
jobs:
  test-ssot:
    name: Test · SSOT (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: oven-sh/setup-bun@v2
      - name: Run tests
        working-directory: Service_SSOT
        run: bun install && bun test
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ env.CI_ENCRYPTION_KEY }}

  test-login:
    name: Test · Login (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: auth_service
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        working-directory: Service_Login
        run: pip install -r requirements-dev.txt && pytest tests/ -v
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          DATABASE_URL: postgresql://user:password@localhost:5432/auth_service
          REDIS_URL: redis://localhost:6379/0

  test-config-table:
    name: Test · Config Table (Python)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        working-directory: Service_Config_Table
        run: pip install -r requirements.txt && pytest tests/ -v
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: redis://localhost:6379/0

  test-template:
    name: Test · Template (Python)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        working-directory: Service_Template
        run: pip install -r requirements.txt && pytest tests/ -v
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          REDIS_URL: redis://localhost:6379/0

  test-version-control:
    name: Test · Version Control (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        working-directory: Service_Version_Control
        run: pip install -r requirements.txt && pytest tests/ -v
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: redis://localhost:6379/0

  test-frontend:
    name: Test · Frontend (Docker build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - name: Docker build smoke test
        working-directory: Service_FrontendUI
        run: docker build -t smoke-frontend:ci .

# ── 2. Build + push all images to Artifact Registry ───────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs:
      - test-ssot
      - test-login
      - test-config-table
      - test-template
      - test-version-control
      - test-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push all images
        env:
          REGISTRY: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}
          SHA: ${{ github.sha }}
        run: |
          build_push() {
            local dir="$1" name="$2"
            echo "▶ Building $name…"
            docker build -t "$REGISTRY/$name:$SHA" -t "$REGISTRY/$name:latest" "./$dir"
            docker push "$REGISTRY/$name:$SHA"
            docker push "$REGISTRY/$name:latest"
          }
          build_push Service_Login           login
          build_push Service_SSOT            ssot
          build_push Service_Config_Table    config-table
          build_push Service_Template        template
          build_push Service_Version_Control version-control
          build_push Service_FrontendUI      frontend

# ── 3. Deploy to GKE ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}

      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      # Secrets injected from GitHub Secrets — never stored in the repo
      - name: Apply shared secrets
        run: |
          kubectl create secret generic shared-secrets \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=NEO4J_PASSWORD="${{ secrets.NEO4J_PASSWORD }}" \
            --from-literal=DATABASE_URL_LOGIN="postgresql://user:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/auth_service" \
            --from-literal=DATABASE_URL_CONFIG="postgresql+asyncpg://user:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/config_table_db" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply infrastructure (databases)
        run: |
          kubectl apply -f k8s/infra/configmap.yaml
          kubectl apply -f k8s/infra/postgres.yaml
          kubectl apply -f k8s/infra/redis.yaml
          kubectl apply -f k8s/infra/neo4j.yaml
          echo "Waiting for databases…"
          kubectl rollout status statefulset/postgres -n ${{ env.K8S_NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/redis     -n ${{ env.K8S_NAMESPACE }} --timeout=60s
          kubectl rollout status statefulset/neo4j    -n ${{ env.K8S_NAMESPACE }} --timeout=180s

      # envsubst replaces IMAGE_* placeholders in k8s/services/*.yaml with real registry paths
      - name: Deploy application services
        env:
          IMAGE_LOGIN:           ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/login:${{ github.sha }}
          IMAGE_SSOT:            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/ssot:${{ github.sha }}
          IMAGE_CONFIG_TABLE:    ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/config-table:${{ github.sha }}
          IMAGE_TEMPLATE:        ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/template:${{ github.sha }}
          IMAGE_VERSION_CONTROL: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/version-control:${{ github.sha }}
          IMAGE_FRONTEND:        ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/frontend:${{ github.sha }}
        run: |
          for f in k8s/services/*.yaml; do
            envsubst < "$f" | kubectl apply -f -
          done

      - name: Apply ingress
        run: kubectl apply -f k8s/ingress.yaml

      - name: Wait for all service rollouts
        run: |
          for deploy in service-login service-ssot service-config-table \
                        service-template service-version-control service-frontendui; do
            echo "⏳ Waiting for $deploy…"
            kubectl rollout status deployment/$deploy -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          done

      - name: Print access URL
        run: |
          echo ""
          echo "✅ Deployment complete!"
          INGRESS_IP=$(kubectl get ingress config-system-ingress \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending — check in ~60s")
          echo "🌐 App: http://$INGRESS_IP"
