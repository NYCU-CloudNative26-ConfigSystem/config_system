name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  GAR_LOCATION: us-central1
  GAR_REPO: config-system
  GKE_CLUSTER: config-system
  GKE_REGION: us-central1
  # Safe dummy values for CI tests (64 hex chars = valid AES-256 key)
  CI_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  CI_SECRET_KEY: test-secret-key-for-ci-minimum-32-chars

# ── 1. Tests ──────────────────────────────────────────────────────────────────
jobs:
  test-ssot:
    name: Test · SSOT (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: oven-sh/setup-bun@v2
      - name: Run tests
        working-directory: Service_SSOT
        run: bun install && bun test
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ env.CI_ENCRYPTION_KEY }}

  test-login:
    name: Test · Login (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: auth_service
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        working-directory: Service_Login
        run: pip install -r requirements-dev.txt && pytest tests/ -v
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          DATABASE_URL: postgresql://user:password@localhost:5432/auth_service
          REDIS_URL: redis://localhost:6379/0

  test-config-table:
    name: Test · Config Table (Python)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        working-directory: Service_Config_Table
        run: pip install -r requirements.txt && pytest tests/ -v
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: redis://localhost:6379/0

  test-frontend:
    name: Test · Frontend (Docker build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - name: Docker build smoke test
        working-directory: Service_FrontendUI
        run: docker build -t smoke-frontend:ci .

# ── 2. Build + push all images to Artifact Registry ───────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs:
      - test-ssot
      - test-login
      - test-config-table
      - test-frontend
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push all images
        env:
          REGISTRY: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}
          SHA: ${{ github.sha }}
        run: |
          build_push() {
            local dir="$1" name="$2"
            echo "▶ Building $name…"
            docker build -t "$REGISTRY/$name:$SHA" -t "$REGISTRY/$name:latest" "./$dir"
            docker push "$REGISTRY/$name:$SHA"
            docker push "$REGISTRY/$name:latest"
          }
          build_push Service_Login           login
          build_push Service_SSOT            ssot
          build_push Service_Config_Table    config-table
          build_push Service_FrontendUI      frontend

# ── 3a. Deploy to staging (dev branch) ────────────────────────────────────────
  deploy-staging:
    name: Deploy · Staging
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/dev'
    environment: staging
    env:
      K8S_NAMESPACE: config-system-staging
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Apply namespace
        run: envsubst < k8s/namespace.yaml | kubectl apply -f -

      - name: Apply shared secrets
        run: |
          kubectl create secret generic shared-secrets \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=NEO4J_PASSWORD="${{ secrets.NEO4J_PASSWORD }}" \
            --from-literal=NEO4J_AUTH="neo4j/${{ secrets.NEO4J_PASSWORD }}" \
            --from-literal=DATABASE_URL_LOGIN="postgresql://user:${{ secrets.POSTGRES_PASSWORD }}@postgres-rw:5432/auth_service" \
            --from-literal=DATABASE_URL_CONFIG="postgresql+asyncpg://user:${{ secrets.POSTGRES_PASSWORD }}@postgres-rw:5432/config_table_db" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic postgres-app-creds \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --from-literal=username="user" \
            --from-literal=password="${{ secrets.POSTGRES_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Install Helm + CloudNativePG operator
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update
          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system --create-namespace \
            --wait --timeout 5m
          kubectl wait --for=condition=Ready pod \
            -l app.kubernetes.io/name=cloudnative-pg \
            -n cnpg-system --timeout=120s

      - name: Apply infrastructure (databases)
        run: |
          # Remove legacy resource types that were replaced by HA setup (idempotent, safe on fresh cluster)
          kubectl delete deployment redis -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          kubectl delete statefulset postgres -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          kubectl delete service postgres -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          kubectl delete configmap postgres-init -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          envsubst < k8s/infra/configmap.yaml | kubectl apply -f -
          envsubst < k8s/infra/redis.yaml     | kubectl apply -f -
          envsubst < k8s/infra/neo4j.yaml     | kubectl apply -f -
          for i in 1 2 3 4 5; do
            if envsubst < k8s/infra/postgres.yaml | kubectl apply -f -; then break; fi
            echo "CNPG webhook not ready yet, retrying in 20s… ($i/5)"
            sleep 20
          done
          echo "Waiting for databases…"
          kubectl wait --for=condition=Ready cluster/postgres \
            -n ${{ env.K8S_NAMESPACE }} --timeout=600s
          kubectl rollout status statefulset/redis          -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status statefulset/redis-sentinel -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout restart deployment/redis-haproxy -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/redis-haproxy   -n ${{ env.K8S_NAMESPACE }} --timeout=120s
          kubectl rollout status statefulset/neo4j          -n ${{ env.K8S_NAMESPACE }} --timeout=600s

      - name: Deploy application services
        env:
          IMAGE_LOGIN:        ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/login:${{ github.sha }}
          IMAGE_SSOT:         ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/ssot:${{ github.sha }}
          IMAGE_CONFIG_TABLE: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/config-table:${{ github.sha }}
          IMAGE_FRONTEND:     ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/frontend:${{ github.sha }}
        run: |
          for f in k8s/services/*.yaml; do
            envsubst < "$f" | kubectl apply -f -
          done

      - name: Apply ingress
        run: envsubst < k8s/ingress.yaml | kubectl apply -f -

      - name: Wait for all service rollouts
        run: |
          for deploy in service-login service-ssot service-config-table service-frontendui; do
            echo "⏳ Waiting for $deploy…"
            kubectl get pods -n ${{ env.K8S_NAMESPACE }} --no-headers \
              | awk -v d="$deploy" '$0 ~ d && /Terminating/{print $1}' \
              | xargs -r kubectl delete pod --grace-period=0 --force -n ${{ env.K8S_NAMESPACE }} \
              || true
            kubectl rollout status deployment/$deploy -n ${{ env.K8S_NAMESPACE }} --timeout=600s
          done

      - name: Dump pod diagnostics on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide
          echo ""
          for deploy in service-login service-ssot service-config-table service-frontendui; do
            echo "=== Events: $deploy ==="
            kubectl describe deployment/$deploy -n ${{ env.K8S_NAMESPACE }} 2>/dev/null | tail -20 || true
            echo "=== Logs: $deploy ==="
            kubectl logs -n ${{ env.K8S_NAMESPACE }} -l app=$deploy --tail=50 --all-containers 2>/dev/null || true
          done

      - name: Print access URL
        run: |
          echo ""
          echo "✅ Staging deployment complete!"
          INGRESS_IP=$(kubectl get ingress ${{ env.K8S_NAMESPACE }}-ingress \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending — check in ~60s")
          echo "🧪 Staging: http://$INGRESS_IP"

# ── 3b. Deploy to production (main branch) ────────────────────────────────────
  deploy-production:
    name: Deploy · Production
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      K8S_NAMESPACE: config-system
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Apply namespace
        run: envsubst < k8s/namespace.yaml | kubectl apply -f -

      - name: Apply shared secrets
        run: |
          kubectl create secret generic shared-secrets \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=NEO4J_PASSWORD="${{ secrets.NEO4J_PASSWORD }}" \
            --from-literal=NEO4J_AUTH="neo4j/${{ secrets.NEO4J_PASSWORD }}" \
            --from-literal=DATABASE_URL_LOGIN="postgresql://user:${{ secrets.POSTGRES_PASSWORD }}@postgres-rw:5432/auth_service" \
            --from-literal=DATABASE_URL_CONFIG="postgresql+asyncpg://user:${{ secrets.POSTGRES_PASSWORD }}@postgres-rw:5432/config_table_db" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic postgres-app-creds \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --from-literal=username="user" \
            --from-literal=password="${{ secrets.POSTGRES_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Install Helm + CloudNativePG operator
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update
          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system --create-namespace \
            --wait --timeout 5m
          kubectl wait --for=condition=Ready pod \
            -l app.kubernetes.io/name=cloudnative-pg \
            -n cnpg-system --timeout=120s

      - name: Apply infrastructure (databases)
        run: |
          # Remove legacy resource types that were replaced by HA setup (idempotent, safe on fresh cluster)
          kubectl delete deployment redis -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          kubectl delete statefulset postgres -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          kubectl delete service postgres -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          kubectl delete configmap postgres-init -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
          envsubst < k8s/infra/configmap.yaml | kubectl apply -f -
          envsubst < k8s/infra/redis.yaml     | kubectl apply -f -
          envsubst < k8s/infra/neo4j.yaml     | kubectl apply -f -
          for i in 1 2 3 4 5; do
            if envsubst < k8s/infra/postgres.yaml | kubectl apply -f -; then break; fi
            echo "CNPG webhook not ready yet, retrying in 20s… ($i/5)"
            sleep 20
          done
          echo "Waiting for databases…"
          kubectl wait --for=condition=Ready cluster/postgres \
            -n ${{ env.K8S_NAMESPACE }} --timeout=600s
          kubectl rollout status statefulset/redis          -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status statefulset/redis-sentinel -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout restart deployment/redis-haproxy -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/redis-haproxy   -n ${{ env.K8S_NAMESPACE }} --timeout=120s
          kubectl rollout status statefulset/neo4j          -n ${{ env.K8S_NAMESPACE }} --timeout=600s

      - name: Deploy monitoring stack (Prometheus + Grafana)
        env:
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
        run: |
          helm repo add prometheus-community \
            https://prometheus-community.github.io/helm-charts
          helm repo update
          kubectl apply -f k8s/monitoring/namespace.yaml
          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --values k8s/monitoring/kube-prometheus-values.yaml \
            --set grafana.adminPassword="${GRAFANA_PASSWORD}" \
            --timeout 10m --wait
          envsubst < k8s/monitoring/postgres-exporter.yaml | kubectl apply -f -
          envsubst < k8s/monitoring/redis-exporter.yaml    | kubectl apply -f -
          envsubst < k8s/monitoring/neo4j-servicemonitor.yaml | kubectl apply -f -
          envsubst < k8s/monitoring/alert-rules.yaml       | kubectl apply -f -
          kubectl apply -f k8s/monitoring/grafana-ingress.yaml

      - name: Deploy application services
        env:
          IMAGE_LOGIN:        ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/login:${{ github.sha }}
          IMAGE_SSOT:         ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/ssot:${{ github.sha }}
          IMAGE_CONFIG_TABLE: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/config-table:${{ github.sha }}
          IMAGE_FRONTEND:     ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/frontend:${{ github.sha }}
        run: |
          for f in k8s/services/*.yaml; do
            envsubst < "$f" | kubectl apply -f -
          done

      - name: Apply ingress
        run: envsubst < k8s/ingress.yaml | kubectl apply -f -

      - name: Wait for all service rollouts
        run: |
          for deploy in service-login service-ssot service-config-table service-frontendui; do
            echo "⏳ Waiting for $deploy…"
            kubectl get pods -n ${{ env.K8S_NAMESPACE }} --no-headers \
              | awk -v d="$deploy" '$0 ~ d && /Terminating/{print $1}' \
              | xargs -r kubectl delete pod --grace-period=0 --force -n ${{ env.K8S_NAMESPACE }} \
              || true
            kubectl rollout status deployment/$deploy -n ${{ env.K8S_NAMESPACE }} --timeout=600s
          done

      - name: Dump pod diagnostics on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide
          echo ""
          for deploy in service-login service-ssot service-config-table service-frontendui; do
            echo "=== Events: $deploy ==="
            kubectl describe deployment/$deploy -n ${{ env.K8S_NAMESPACE }} 2>/dev/null | tail -20 || true
            echo "=== Logs: $deploy ==="
            kubectl logs -n ${{ env.K8S_NAMESPACE }} -l app=$deploy --tail=50 --all-containers 2>/dev/null || true
          done

      - name: Print access URLs
        run: |
          echo ""
          echo "✅ Production deployment complete!"
          INGRESS_IP=$(kubectl get ingress ${{ env.K8S_NAMESPACE }}-ingress \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          GRAFANA_IP=$(kubectl get ingress grafana-ingress \
            -n monitoring \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          echo "🌐 App:     http://$INGRESS_IP"
          echo "📊 Grafana: http://$GRAFANA_IP  (login: admin / GRAFANA_PASSWORD secret)"
