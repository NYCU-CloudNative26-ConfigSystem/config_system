name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:

  # ── Service_Config_Table ──────────────────────────────────────────────────────
  test-config-table:
    name: Config Table (pytest)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Service_Config_Table/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: Service_Config_Table

      - name: Run tests
        run: pytest tests/ -v --tb=short
        working-directory: Service_Config_Table
        env:
          SECRET_KEY: test-secret-key-for-ci
          REDIS_URL: redis://localhost:6379/0

  # ── Service_SSOT ─────────────────────────────────────────────────────────────
  test-ssot:
    name: SSOT (bun test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: Service_SSOT

      - name: Run tests
        run: bun test
        working-directory: Service_SSOT
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci

  # ── Service_Login ─────────────────────────────────────────────────────────────
  test-login:
    name: Login (pytest)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Service_Login/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
        working-directory: Service_Login

      - name: Run tests
        run: pytest tests/ -v --tb=short
        working-directory: Service_Login
        env:
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: "sqlite:///./test.db"
          REDIS_URL: redis://localhost:6379/0
