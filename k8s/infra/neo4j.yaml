apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: config-system
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels: {app: neo4j}
  template:
    metadata:
      labels: {app: neo4j}
    spec:
      enableServiceLinks: false
      containers:
        - name: neo4j
          image: neo4j:5-community
          ports:
            - {containerPort: 7474, name: http}
            - {containerPort: 7687, name: bolt}
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: NEO4J_AUTH}
            - name: NEO4J_server_config_strict__validation_enabled
              value: "false"
          volumeMounts:
            - {name: data, mountPath: /data}
          readinessProbe:
            httpGet: {path: /, port: 7474}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: {storage: 5Gi}
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: config-system
spec:
  selector: {app: neo4j}
  ports:
    - {name: http, port: 7474, targetPort: 7474}
    - {name: bolt, port: 7687, targetPort: 7687}
