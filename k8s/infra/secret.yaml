# ── DO NOT put real values here — this file is committed to the repo ──────────
# Real secrets are injected by GitHub Actions from repository secrets.
# This file documents the expected keys only.
# To apply manually (replace <...> with real values):
#
#   kubectl create secret generic shared-secrets \
#     --namespace=config-system \
#     --from-literal=SECRET_KEY="<jwt-secret>" \
#     --from-literal=ENCRYPTION_KEY="<64-hex-chars>" \
#     --from-literal=POSTGRES_PASSWORD="<password>" \
#     --from-literal=NEO4J_PASSWORD="<password>" \
#     --from-literal=DATABASE_URL_LOGIN="postgresql://user:<password>@postgres:5432/auth_service" \
#     --from-literal=DATABASE_URL_CONFIG="postgresql+asyncpg://user:<password>@postgres:5432/config_table_db" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
apiVersion: v1
kind: Secret
metadata:
  name: shared-secrets
  namespace: config-system
type: Opaque
stringData:
  SECRET_KEY: "PLACEHOLDER"
  ENCRYPTION_KEY: "PLACEHOLDER"
  POSTGRES_PASSWORD: "PLACEHOLDER"
  NEO4J_PASSWORD: "PLACEHOLDER"
  DATABASE_URL_LOGIN: "PLACEHOLDER"
  DATABASE_URL_CONFIG: "PLACEHOLDER"
