apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: config-system
data:
  init-db.sh: |
    #!/bin/bash
    set -e
    psql -U "$POSTGRES_USER" -c "CREATE DATABASE config_table_db;"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: config-system
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: {app: postgres}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - {name: POSTGRES_USER, value: user}
            - {name: POSTGRES_DB, value: auth_service}
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: POSTGRES_PASSWORD}
          ports: [{containerPort: 5432}]
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
            - {name: init, mountPath: /docker-entrypoint-initdb.d}
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init
          configMap: {name: postgres-init}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: {storage: 5Gi}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: config-system
spec:
  selector: {app: postgres}
  ports: [{port: 5432}]
