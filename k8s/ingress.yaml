apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${K8S_NAMESPACE}-ingress
  namespace: ${K8S_NAMESPACE}
  annotations:
    # Use GKE's native HTTP(S) Load Balancer (no extra controller needed)
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - http:
        paths:
          # All traffic goes to the Nuxt frontend, which proxies /api/* internally
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service-frontendui
                port:
                  number: 3000

