apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: config-system-alerts
  namespace: config-system
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: config-system.pods
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="config-system"}[5m]) * 60 > 0
          for: 5m
          labels:
            severity: critical
            namespace: config-system
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted more than once in the last 5 minutes."

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="config-system", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
            namespace: config-system
          annotations:
            summary: "Pod {{ $labels.pod }} not ready"
            description: "Pod {{ $labels.pod }} has been in a non-ready state for more than 5 minutes."

        - alert: HighMemoryUsage
          expr: |
            (
              container_memory_working_set_bytes{namespace="config-system", container!=""}
              / container_spec_memory_limit_bytes{namespace="config-system", container!=""}
            ) > 0.8
          for: 5m
          labels:
            severity: warning
            namespace: config-system
          annotations:
            summary: "High memory usage in {{ $labels.container }}"
            description: "Container {{ $labels.container }} is using more than 80% of its memory limit."

    - name: config-system.exporters
      rules:
        - alert: PostgresExporterDown
          expr: up{job="postgres-exporter", namespace="config-system"} == 0
          for: 2m
          labels:
            severity: critical
            namespace: config-system
          annotations:
            summary: "Postgres exporter is down"
            description: "Cannot scrape PostgreSQL metrics — database may be unreachable."

        - alert: RedisExporterDown
          expr: up{job="redis-exporter", namespace="config-system"} == 0
          for: 2m
          labels:
            severity: critical
            namespace: config-system
          annotations:
            summary: "Redis exporter is down"
            description: "Cannot scrape Redis metrics — cache may be unreachable."
