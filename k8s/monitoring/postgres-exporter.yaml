apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: config-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: postgres-exporter}
  template:
    metadata:
      labels: {app: postgres-exporter}
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - {containerPort: 9187, name: metrics}
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: DATABASE_URL_LOGIN}
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "128Mi"
          readinessProbe:
            httpGet: {path: /, port: 9187}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: config-system
  labels:
    app: postgres-exporter
spec:
  selector: {app: postgres-exporter}
  ports:
    - {name: metrics, port: 9187, targetPort: 9187}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: config-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: postgres-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
