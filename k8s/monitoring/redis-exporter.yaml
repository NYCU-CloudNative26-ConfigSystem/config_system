apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: ${K8S_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels: {app: redis-exporter}
  template:
    metadata:
      labels: {app: redis-exporter}
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.62.0
          ports:
            - {containerPort: 9121, name: metrics}
          env:
            - {name: REDIS_ADDR, value: "redis://redis:6379"}
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              memory: "64Mi"
          readinessProbe:
            httpGet: {path: /health, port: 9121}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: ${K8S_NAMESPACE}
  labels:
    app: redis-exporter
spec:
  selector: {app: redis-exporter}
  ports:
    - {name: metrics, port: 9121, targetPort: 9121}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-exporter
  namespace: ${K8S_NAMESPACE}
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: redis-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
