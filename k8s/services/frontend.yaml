apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-iamatestpage
  namespace: config-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: service-iamatestpage}
  template:
    metadata:
      labels: {app: service-iamatestpage}
    spec:
      containers:
        - name: app
          image: service-iamatestpage:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 80}]
          readinessProbe:
            httpGet: {path: /, port: 80}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-iamatestpage
  namespace: config-system
spec:
  selector: {app: service-iamatestpage}
  ports: [{port: 80, targetPort: 80}]
