apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-frontendui
  namespace: config-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: service-frontendui}
  template:
    metadata:
      labels: {app: service-frontendui}
    spec:
      containers:
        - name: app
          image: service-frontendui:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 3000}]
          readinessProbe:
            httpGet: {path: /, port: 3000}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-frontendui
  namespace: config-system
spec:
  selector: {app: service-frontendui}
  ports: [{port: 3000, targetPort: 3000}]
