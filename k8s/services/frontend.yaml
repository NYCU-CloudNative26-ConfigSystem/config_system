apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-frontendui
  namespace: config-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: service-frontendui}
  template:
    metadata:
      labels: {app: service-frontendui}
    spec:
      containers:
        - name: app
          image: ${IMAGE_FRONTEND}
          imagePullPolicy: Always
          ports: [{containerPort: 3000}]
          env:
            # Nuxt server-side proxy routes — points to internal Kubernetes services
            - {name: LOGIN_URL,    value: "http://service-login:8000"}
            - {name: CONFIG_URL,   value: "http://service-config-table:18001"}
            - {name: SSOT_URL,     value: "http://service-ssot:3000"}
            - {name: TEMPLATE_URL, value: "http://service-template:18003"}
            - {name: VERSION_URL,  value: "http://service-version-control:18004"}
          readinessProbe:
            httpGet: {path: /, port: 3000}
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-frontendui
  namespace: config-system
spec:
  selector: {app: service-frontendui}
  # NodePort needed for GKE HTTP(S) Load Balancer backend health checks
  type: NodePort
  ports: [{port: 3000, targetPort: 3000}]
