apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-ssot
  namespace: ${K8S_NAMESPACE}
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 1, maxSurge: 0}
  selector:
    matchLabels: {app: service-ssot}
  template:
    metadata:
      labels: {app: service-ssot}
    spec:
      containers:
        - name: app
          image: ${IMAGE_SSOT}
          imagePullPolicy: Always
          ports: [{containerPort: 3000}]
          env:
            - {name: HOST, value: "0.0.0.0"}
            - {name: PORT, value: "3000"}
            - {name: NEO4J_URI,  value: "bolt://neo4j:7687"}
            - {name: NEO4J_USER, value: neo4j}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: NEO4J_PASSWORD}
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef: {name: shared-config, key: REDIS_URL}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: SECRET_KEY}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: ENCRYPTION_KEY}
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              memory: "512Mi"
          readinessProbe:
            httpGet: {path: /health, port: 3000}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: service-ssot
  namespace: ${K8S_NAMESPACE}
spec:
  selector: {app: service-ssot}
  ports: [{port: 3000, targetPort: 3000}]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: service-ssot-pdb
  namespace: ${K8S_NAMESPACE}
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: service-ssot
