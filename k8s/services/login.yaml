apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-login
  namespace: config-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: service-login}
  template:
    metadata:
      labels: {app: service-login}
    spec:
      containers:
        - name: app
          image: service-login:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8000}]
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef: {name: shared-config, key: DATABASE_URL_LOGIN}
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef: {name: shared-config, key: REDIS_URL}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: SECRET_KEY}
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-login
  namespace: config-system
spec:
  selector: {app: service-login}
  ports: [{port: 8000, targetPort: 8000}]
