apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-login
  namespace: ${K8S_NAMESPACE}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 1, maxSurge: 0}
  selector:
    matchLabels: {app: service-login}
  template:
    metadata:
      labels: {app: service-login}
    spec:
      containers:
        - name: app
          image: ${IMAGE_LOGIN}
          imagePullPolicy: Always
          ports: [{containerPort: 8000}]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: DATABASE_URL_LOGIN}
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef: {name: shared-config, key: REDIS_URL}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: SECRET_KEY}
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              memory: "512Mi"
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: service-login
  namespace: ${K8S_NAMESPACE}
spec:
  selector: {app: service-login}
  ports: [{port: 8000, targetPort: 8000}]

