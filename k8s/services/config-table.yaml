apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-config-table
  namespace: config-system
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 1, maxSurge: 0}
  selector:
    matchLabels: {app: service-config-table}
  template:
    metadata:
      labels: {app: service-config-table}
    spec:
      containers:
        - name: app
          image: ${IMAGE_CONFIG_TABLE}
          imagePullPolicy: Always
          ports: [{containerPort: 18001}]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: DATABASE_URL_CONFIG}
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef: {name: shared-config, key: REDIS_URL}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: SECRET_KEY}
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              memory: "512Mi"
          readinessProbe:
            httpGet: {path: /health, port: 18001}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: service-config-table
  namespace: config-system
spec:
  selector: {app: service-config-table}
  ports: [{port: 18001, targetPort: 18001}]
