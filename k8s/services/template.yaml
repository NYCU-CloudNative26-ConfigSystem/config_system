apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-template
  namespace: config-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: service-template}
  template:
    metadata:
      labels: {app: service-template}
    spec:
      containers:
        - name: app
          image: service-template:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 18003}]
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef: {name: shared-config, key: REDIS_URL}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef: {name: shared-secrets, key: SECRET_KEY}
          readinessProbe:
            httpGet: {path: /health, port: 18003}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-template
  namespace: config-system
spec:
  selector: {app: service-template}
  ports: [{port: 18003, targetPort: 18003}]
